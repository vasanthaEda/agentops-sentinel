<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>agentops-sentinel · decision trace dashboard</title>
<style>
  :root {
    --bg: #0b1020; --panel: #131a2e; --border: #232c47; --text: #e6e9f2; --muted: #8992ab;
    --accent: #5fb3ff; --ok: #38c976; --err: #ff5d6c; --warn: #f5b942;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: var(--bg); color: var(--text); display: flex; height: 100vh;
  }
  aside {
    width: 300px; border-right: 1px solid var(--border); overflow-y: auto; padding: 16px; flex-shrink: 0;
  }
  aside h1 { font-size: 15px; margin: 0 0 4px; }
  aside p.tag { color: var(--muted); font-size: 12px; margin: 0 0 16px; }
  #refresh {
    width: 100%; padding: 8px; margin-bottom: 12px; background: var(--panel); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px; cursor: pointer; font-size: 13px;
  }
  #refresh:hover { border-color: var(--accent); }
  .trace-item {
    padding: 10px 12px; border-radius: 6px; margin-bottom: 6px; cursor: pointer; font-size: 12.5px;
    border: 1px solid transparent; word-break: break-all; color: var(--muted);
  }
  .trace-item:hover { background: var(--panel); }
  .trace-item.active { background: var(--panel); border-color: var(--accent); color: var(--text); }
  main { flex: 1; overflow-y: auto; padding: 24px; }
  .empty { color: var(--muted); margin-top: 40px; text-align: center; }
  .span-card {
    background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
    padding: 14px 16px; margin-bottom: 10px; position: relative;
  }
  .span-card.err { border-color: var(--err); }
  .span-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .badge {
    font-size: 10.5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em;
    padding: 2px 8px; border-radius: 999px; border: 1px solid var(--border);
  }
  .badge.supervisor { color: var(--accent); border-color: var(--accent); }
  .badge.agent { color: var(--ok); border-color: var(--ok); }
  .badge.guardrail { color: var(--warn); border-color: var(--warn); }
  .badge.tool { color: #c98bff; border-color: #c98bff; }
  .span-name { font-weight: 600; }
  .span-dur { margin-left: auto; color: var(--muted); font-size: 12px; }
  .status-ok { color: var(--ok); font-size: 11px; }
  .status-error { color: var(--err); font-size: 11px; }
  .attrs { font-size: 12px; color: var(--muted); line-height: 1.6; }
  .attrs b { color: var(--text); }
  h2 { font-size: 16px; margin: 0 0 16px; }
</style>
</head>
<body>
<aside>
  <h1>agentops-sentinel</h1>
  <p class="tag">decision trace dashboard</p>
  <button id="refresh">↻ Refresh traces</button>
  <div id="trace-list"></div>
</aside>
<main>
  <div id="content" class="empty">Select a trace on the left to inspect its decision timeline.</div>
</main>
<script>
async function fetchJSON(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(`${url} -> ${res.status}`);
  return res.json();
}

function badgeClass(kind) {
  return { supervisor: 'supervisor', agent: 'agent', guardrail: 'guardrail', tool: 'tool' }[kind] || 'agent';
}

function renderAttrs(attrs) {
  const entries = Object.entries(attrs || {}).filter(([k]) => k.startsWith('agentops.'));
  if (!entries.length) return '';
  return '<div class="attrs">' + entries.map(([k, v]) =>
    `<div><b>${k.replace('agentops.', '')}:</b> ${typeof v === 'string' ? v : JSON.stringify(v)}</div>`
  ).join('') + '</div>';
}

function renderTrace(traceId, spans) {
  const content = document.getElementById('content');
  if (!spans.length) {
    content.innerHTML = '<div class="empty">No spans recorded for this trace.</div>';
    return;
  }
  const cards = spans.map(span => `
    <div class="span-card ${span.status === 'ERROR' ? 'err' : ''}">
      <div class="span-row">
        <span class="badge ${badgeClass(span.kind)}">${span.kind}</span>
        <span class="span-name">${span.name}</span>
        <span class="span-dur">${span.duration_ms.toFixed(2)} ms</span>
      </div>
      <div class="${span.status === 'ERROR' ? 'status-error' : 'status-ok'}">${span.status}${span.error ? ' — ' + span.error : ''}</div>
      ${renderAttrs(span.attributes)}
    </div>
  `).join('');
  content.innerHTML = `<h2>Trace: ${traceId}</h2>${cards}`;
}

async function selectTrace(traceId) {
  document.querySelectorAll('.trace-item').forEach(el => el.classList.toggle('active', el.dataset.id === traceId));
  const data = await fetchJSON(`/traces/${traceId}`);
  renderTrace(traceId, data.spans);
}

async function loadTraces() {
  const data = await fetchJSON('/traces');
  const list = document.getElementById('trace-list');
  if (!data.trace_ids.length) {
    list.innerHTML = '<p style="color:var(--muted);font-size:12px;">No tickets processed yet. POST to /tickets to generate a trace.</p>';
    return;
  }
  list.innerHTML = data.trace_ids.slice().reverse().map(id =>
    `<div class="trace-item" data-id="${id}" onclick="selectTrace('${id}')">${id}</div>`
  ).join('');
}

document.getElementById('refresh').addEventListener('click', loadTraces);
loadTraces();
</script>
</body>
</html>
